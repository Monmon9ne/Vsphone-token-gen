<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VSPhone Auto Finder</title>
    <style>
        body { background: #0d1117; color: #58a6ff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #161b22; border: 1px solid #30363d; padding: 30px; border-radius: 12px; width: 450px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h2 { color: #7ee787; margin-bottom: 20px; font-size: 1.5rem; }
        .status-box { color: #8b949e; margin-bottom: 15px; font-size: 0.9rem; }
        .result-box { background: #000; color: #7ee787; padding: 15px; border-radius: 6px; word-break: break-all; border: 1px solid #238636; font-family: monospace; display: none; margin-top: 15px; }
        button { background: #238636; color: #fff; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        button:hover { background: #2ea043; }
        .footer { font-size: 0.7rem; color: #484f58; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>PAD Auto Finder 🚀</h2>
    <div id="status" class="status-box">Đang chờ Admin Token...</div>
    
    <div id="result" class="result-box"></div>
    
    <button id="mainBtn" onclick="startProcess()">CHẠY TỰ ĐỘNG</button>
    
    <div class="footer">Dán URL nhận được vào Discord: /settoken [URL]</div>
</div>

<script>
    // --- CẤU HÌNH ---
    const ADMIN_TOKEN = "DÁN_TOKEN_EY_CỦA_BẠN_VÀO_ĐÂY"; 
    const API_BASE = "https://api.vsphone.com/vsphone/api";

    async function startProcess() {
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        const btn = document.getElementById('mainBtn');

        if (ADMIN_TOKEN.includes("DÁN_TOKEN")) {
            status.innerText = "❌ Bạn chưa dán Token vào code!";
            return;
        }

        try {
            btn.disabled = true;
            status.innerText = "🔍 Đang quét danh sách máy ảo...";

            // 1. Tìm PAD đầu tiên
            const listRes = await fetch(`${API_BASE}/userEquipment/listEquipment`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'token': ADMIN_TOKEN.trim() },
                body: JSON.stringify({ pageNo: 1, pageSize: 5 })
            });
            const listData = await listRes.json();
            const padCode = listData.data?.records?.[0]?.padCode;

            if (!padCode) {
                status.innerText = "❌ Không tìm thấy máy nào trong tài khoản.";
                btn.disabled = false;
                return;
            }

            status.innerText = `✅ Đã chọn máy: ${padCode}. Đang lấy STS...`;

            // 2. Lấy STS Token
            const stsRes = await fetch(`${API_BASE}/padApi/stsToken`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'token': ADMIN_TOKEN.trim() },
                body: JSON.stringify({ padCode: padCode })
            });
            const stsData = await stsRes.json();
            const stsToken = stsData.data?.token;

            if (stsToken) {
                const auth = btoa(JSON.stringify({ token: stsToken, ts: Date.now() }));
                const finalUrl = `https://cloud.vsphone.com/#vsphone_auth_${auth}`;
                
                result.innerText = finalUrl;
                result.style.display = 'block';
                status.innerText = "🚀 THÀNH CÔNG!";
                
                // Tự động copy
                navigator.clipboard.writeText(finalUrl);
                btn.innerText = "ĐÃ COPY VÀO BỘ NHỚ!";
            } else {
                status.innerText = "❌ Lỗi: " + (stsData.msg || "Token Admin hết hạn.");
                btn.disabled = false;
            }

        } catch (err) {
            status.innerText = "❌ Lỗi kết nối (CORS hoặc Mạng)";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
